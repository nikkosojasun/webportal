<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebPortal - Home Lab Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="title">WebPortal</h1>
                <p class="subtitle">Home Lab Dashboard</p>
            </div>
            <div class="header-actions">
                <button id="addBtn" class="btn btn-primary">+ Add Link</button>
                <button id="settingsBtn" class="btn btn-secondary">⚙️ Settings</button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <div id="linksContainer" class="links-grid">
                <!-- Links will be dynamically inserted here -->
            </div>
            <div id="emptyState" class="empty-state">
                <p>No links yet. Click "Add Link" to get started!</p>
            </div>
        </main>
    </div>

    <!-- Add/Edit Modal -->
    <div id="linkModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add Link</h2>
                <button class="modal-close" onclick="closeLinkModal()">&times;</button>
            </div>
            <form id="linkForm" onsubmit="submitLinkForm(event)">
                <div class="form-group">
                    <label for="linkTitle">Title *</label>
                    <input type="text" id="linkTitle" required placeholder="e.g., Plex Media Server">
                </div>

                <div class="form-group">
                    <label for="linkUrl">URL *</label>
                    <input type="url" id="linkUrl" required placeholder="e.g., http://192.168.1.100:32400">
                </div>

                <div class="form-group">
                    <label for="linkDescription">Description</label>
                    <input type="text" id="linkDescription" placeholder="e.g., Media streaming service">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="linkCategory">Category</label>
                        <input type="text" id="linkCategory" placeholder="e.g., Entertainment">
                    </div>

                    <div class="form-group">
                        <label for="linkColor">Color</label>
                        <div class="color-picker">
                            <input type="color" id="linkColor" value="#3498DB">
                            <div class="color-presets">
                                <button type="button" class="color-btn" style="background-color: #FF6B6B" onclick="setColor('#FF6B6B')"></button>
                                <button type="button" class="color-btn" style="background-color: #4ECDC4" onclick="setColor('#4ECDC4')"></button>
                                <button type="button" class="color-btn" style="background-color: #45B7D1" onclick="setColor('#45B7D1')"></button>
                                <button type="button" class="color-btn" style="background-color: #F7DC6F" onclick="setColor('#F7DC6F')"></button>
                                <button type="button" class="color-btn" style="background-color: #BB8FCE" onclick="setColor('#BB8FCE')"></button>
                                <button type="button" class="color-btn" style="background-color: #85C1E2" onclick="setColor('#85C1E2')"></button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Save</button>
                    <button type="button" class="btn btn-secondary" onclick="closeLinkModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Settings</h2>
                <button class="modal-close" onclick="closeSettingsModal()">&times;</button>
            </div>
            <div class="settings-content">
                <div class="settings-section">
                    <h3>Configuration</h3>
                    <p>Import or export your portal configuration as a YAML file.</p>
                    <div class="settings-actions">
                        <button class="btn btn-primary" onclick="exportConfig()">📥 Export Configuration</button>
                        <button class="btn btn-secondary" onclick="triggerImport()">📤 Import Configuration</button>
                        <input type="file" id="importFile" style="display: none;" accept=".yaml,.yml" onchange="importConfig(event)">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Confirm Delete Modal -->
    <div id="confirmModal" class="modal">
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h2>Confirm Delete</h2>
            </div>
            <p id="confirmMessage">Are you sure you want to delete this link?</p>
            <div class="form-actions">
                <button class="btn btn-danger" onclick="confirmDelete()">Delete</button>
                <button class="btn btn-secondary" onclick="cancelDelete()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
